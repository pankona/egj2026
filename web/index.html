<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Light Mandala</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Pin the inner iframe to a 4:3 box so ebitengine's
           body.clientWidth/Height matches the game's 640x480 logical
           aspect — without this it letterboxes inside the canvas when
           the outer frame isn't exactly 4:3. */
        iframe {
            border: none;
            width: min(100vw, calc(100vh * 4 / 3));
            height: min(100vh, calc(100vw * 3 / 4));
            touch-action: none;
        }
    </style>
</head>
<body>
    <iframe src="game.html" allow="autoplay"></iframe>
</body>
</html>
