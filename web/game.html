<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rift</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            margin: 0 auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <script src="wasm_exec.js"></script>
    <script>
        // Prevent iOS Safari from scrolling/zooming on touch.
        ['touchstart', 'touchmove', 'touchend', 'gesturestart'].forEach(ev => {
            document.addEventListener(ev, e => e.preventDefault(), { passive: false });
        });

        const go = new Go();
        const wasmURL = "main.wasm?v=" + new Date().getTime();
        WebAssembly.instantiateStreaming(fetch(wasmURL), go.importObject).then(result => {
            go.run(result.instance);
        });
    </script>
</body>
</html>
